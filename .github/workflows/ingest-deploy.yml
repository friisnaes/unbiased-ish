name: Daglig opdatering

on:
  schedule:
    # 06:00 dansk sommertid (04:00 UTC) / 05:00 dansk vintertid
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ingestion
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # 1. Hent artikler fra alle kilder
      - name: Ingest articles
        run: npm run ingest

      # 2. Gruppér i cases
      - name: Cluster stories
        run: npm run cluster

      # 3. Generér danske artikelbriefs (30 per kørsel × 4 = 120)
      - name: Generate article briefs (batch 1)
        run: npm run summarize
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Generate article briefs (batch 2)
        run: npm run summarize
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Generate article briefs (batch 3)
        run: npm run summarize
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Generate article briefs (batch 4)
        run: npm run summarize
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # 4. Generér case synthesis (known/disputed/unclear)
      - name: Generate case synthesis
        run: npm run synthesize
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # 5. Generér daglig briefing (Ukraine + Iran + Global)
      - name: Generate daily briefing
        run: npm run briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # 6. Validér links
      - name: Validate links
        run: npm run validate-links

      # 7. Commit hvis ændringer
      - name: Check for changes
        id: changes
        run: |
          git add public/data/
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "Signal over Støj Bot"
          git config user.email "bot@signal-over-stoej.github.io"
          git add public/data/
          git commit -m "data: daglig opdatering $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

  # 8. Byg og deploy
  deploy:
    needs: pipeline
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - run: git pull origin main || true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
